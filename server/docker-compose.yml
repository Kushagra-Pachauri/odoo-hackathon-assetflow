
services:

  postgres:

    image: postgres:16

    container_name: assetflow-db

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetflow

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: